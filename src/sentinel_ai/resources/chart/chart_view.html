<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentinel AI Live Chart</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #050d10;
      color: #d9f6ff;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    #chart-root {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #061014 0%, #03090c 100%);
    }

    #status-overlay {
      position: absolute;
      top: 14px;
      left: 16px;
      z-index: 5;
      color: #9fd9e8;
      font-size: 12px;
      line-height: 1.45;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.70);
    }

    #chart-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="chart-root">
    <canvas id="chart-canvas"></canvas>
    <div id="status-overlay">Sentinel AI chart initialized.</div>
  </div>
  <script src="sentinel_chart_runtime.js"></script>
</body>
</html>
